# ╔══════════════════════════════════════════════════════════════╗
# ║  HOME ENERGY DASHBOARD — Sigenergy + Nord Pool + Shelly        ║
# ║  Requires (HACS): power-flow-card-plus, mini-graph-card,       ║
# ║                   mushroom, apexcharts-card                     ║
# ╚══════════════════════════════════════════════════════════════╝
title: Hem
views:
  # ═══════════════════════════════════════════════════════════════
  # 1 · ÖVERSIKT
  # ═══════════════════════════════════════════════════════════════
  - title: Översikt
    path: oversikt
    icon: mdi:view-dashboard
    type: sections
    max_columns: 4
    sections:
      # ── LIVE ENERGY FLOW ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Energiflöde
            subtitle: Realtid

          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:solar-power-variant
                icon_color: amber
                content: "{{ states('sensor.sigen_plant_pv_power') }} kW"
                tap_action:
                  action: more-info
                entity: sensor.sigen_plant_pv_power
              - type: template
                icon: >-
                  {% set b = states('sensor.sigen_plant_battery_state_of_charge')|float(0) %}{% if b >= 95 %}mdi:battery{% elif b >= 10 %}mdi:battery-{{ (b/10)|int*10 }}{% else %}mdi:battery-outline{% endif %}
                icon_color: >-
                  {% set b = states('sensor.sigen_plant_battery_state_of_charge')|float(0) %}{% if b < 15 %}red{% elif b < 40 %}orange{% else %}green{% endif %}
                content: "{{ states('sensor.sigen_plant_battery_state_of_charge') }} %"
                entity: sensor.sigen_plant_battery_state_of_charge
                tap_action:
                  action: more-info
              - type: template
                icon: mdi:transmission-tower
                icon_color: >-
                  {% if is_state('binary_sensor.sigen_plant_exporting_to_grid','on') %}green{% else %}red{% endif %}
                content: >-
                  {% set e = states('sensor.sigen_plant_grid_export_power')|float(0) %}{% set i = states('sensor.sigen_plant_grid_import_power')|float(0) %}{% if e > 0 %}↑ {{ e }} kW{% else %}↓ {{ i }} kW{% endif %}
                entity: sensor.sigen_plant_grid_active_power
                tap_action:
                  action: more-info
              - type: template
                icon: mdi:home-lightning-bolt
                icon_color: purple
                content: "{{ states('sensor.sigen_plant_consumed_power') }} kW"
                entity: sensor.sigen_plant_consumed_power
                tap_action:
                  action: more-info

          # NOTE: battery uses the *inverted* power sensor so that
          # discharging shows as flowing OUT to the home. If the dot
          # animation runs backwards, swap to sensor.sigen_plant_battery_power
          - type: custom:power-flow-card-plus
            entities:
              battery:
                entity: sensor.sigen_plant_battery_power_inverted
                state_of_charge: sensor.sigen_plant_battery_state_of_charge
                color_state_of_charge_value: true
              grid:
                entity:
                  consumption: sensor.sigen_plant_grid_import_power
                  production: sensor.sigen_plant_grid_export_power
              solar:
                entity: sensor.sigen_plant_pv_power
                display_zero_state: true
              home:
                entity: sensor.sigen_plant_consumed_power
            clickable_entities: true
            use_new_flow_rate_model: true
            w_decimals: 2
            kw_decimals: 2
            min_flow_rate: 0.4
            max_flow_rate: 6
            watt_threshold: 1000
            display_zero_lines:
              mode: grey_out
              transparency: 50

      # ── IDAG (TODAY) ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Idag
            subtitle: Dagens energibalans

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Sol
                secondary: "{{ states('sensor.sigen_plant_daily_pv_energy') }} kWh"
                icon: mdi:solar-power
                icon_color: amber
                tap_action:
                  action: more-info
                entity: sensor.sigen_plant_daily_pv_energy
              - type: custom:mushroom-template-card
                primary: Förbrukat
                secondary: "{{ states('sensor.sigen_plant_daily_load_consumption') }} kWh"
                icon: mdi:home-lightning-bolt
                icon_color: purple
                tap_action:
                  action: more-info
                entity: sensor.sigen_plant_daily_load_consumption
              - type: custom:mushroom-template-card
                primary: Import
                secondary: "{{ states('sensor.sigen_plant_daily_grid_import_energy') }} kWh"
                icon: mdi:transmission-tower-import
                icon_color: red
                tap_action:
                  action: more-info
                entity: sensor.sigen_plant_daily_grid_import_energy
              - type: custom:mushroom-template-card
                primary: Export
                secondary: "{{ states('sensor.sigen_plant_daily_grid_export_energy') }} kWh"
                icon: mdi:transmission-tower-export
                icon_color: green
                tap_action:
                  action: more-info
                entity: sensor.sigen_plant_daily_grid_export_energy

          - type: custom:mini-graph-card
            name: Solproduktion idag
            icon: mdi:solar-power-variant
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            smoothing: true
            line_color: "#f5a623"
            show:
              fill: fade
              extrema: true
            entities:
              - entity: sensor.sigen_plant_pv_power

          - type: custom:mini-graph-card
            name: Elpris
            icon: mdi:cash
            hours_to_show: 24
            points_per_hour: 2
            line_width: 3
            smoothing: true
            line_color: "#ff6b35"
            show:
              fill: fade
              extrema: true
            entities:
              - entity: sensor.total_electricity_price

      # ── SNABBÅTGÄRDER ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Snabbåtgärder
            subtitle: Lås, scener & nyckelfunktioner

          - type: custom:mushroom-lock-card
            entity: lock.dorrlas_nimly
            name: Dörrlås
            icon: mdi:lock

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Framsida på
                icon: mdi:lightbulb-on
                icon_color: amber
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  data:
                    entity_id: scene.framsidan_ligths_on
              - type: custom:mushroom-template-card
                primary: Framsida av
                icon: mdi:lightbulb-off
                icon_color: blue-grey
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  data:
                    entity_id: scene.framsidan_ligths_off

          - type: custom:mushroom-person-card
            entity: person.rock
            primary_info: name
            secondary_info: state

  # ═══════════════════════════════════════════════════════════════
  # 2 · ENERGI
  # ═══════════════════════════════════════════════════════════════
  - title: Energi
    path: energi
    icon: mdi:solar-power-variant
    type: sections
    max_columns: 4
    sections:
      # ── 24H FLOW CHART ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Effektflöde
            subtitle: Senaste 24 timmarna
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
            graph_span: 24h
            span:
              start: day
            chart_type: line
            apex_config:
              chart:
                height: 270
                toolbar:
                  show: false
              stroke:
                curve: smooth
                width: 2.5
              fill:
                type: gradient
                gradient:
                  opacityFrom: 0.35
                  opacityTo: 0.02
              grid:
                borderColor: "rgba(255,255,255,0.06)"
                strokeDashArray: 4
              dataLabels:
                enabled: false
              legend:
                show: true
                position: bottom
                labels:
                  colors: "#9aa0a6"
              xaxis:
                labels:
                  style:
                    colors: "#9aa0a6"
              yaxis:
                decimalsInFloat: 1
                labels:
                  style:
                    colors: "#9aa0a6"
            series:
              - entity: sensor.sigen_plant_pv_power
                name: Sol
                type: area
                color: "#f5a623"
              - entity: sensor.sigen_plant_consumed_power
                name: Förbrukning
                type: line
                color: "#7e57c2"
              - entity: sensor.sigen_plant_battery_power_inverted
                name: Batteri
                type: line
                color: "#43a047"
              - entity: sensor.sigen_plant_grid_active_power
                name: Nät
                type: line
                color: "#1e88e5"

      # ── BATTERY ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Batteri
            subtitle: SigenStor ESS
          - type: gauge
            entity: sensor.sigen_plant_battery_state_of_charge
            name: Laddningsnivå
            unit: "%"
            needle: true
            severity:
              red: 0
              yellow: 20
              green: 50
            min: 0
            max: 100
          - type: custom:mini-graph-card
            name: Batterieffekt
            icon: mdi:battery-charging
            hours_to_show: 24
            points_per_hour: 4
            line_width: 3
            smoothing: true
            line_color: "#43a047"
            show:
              fill: fade
            entities:
              - entity: sensor.sigen_plant_battery_power_inverted
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:heart-pulse
                icon_color: pink
                content: "Hälsa {{ states('sensor.sigen_plant_battery_state_of_health') }}%"
              - type: template
                icon: mdi:thermometer
                icon_color: orange
                content: "{{ states('sensor.sigen_plant_ess_average_cell_temperature') }}°C"
              - type: template
                icon: mdi:battery-high
                icon_color: blue
                content: "{{ states('sensor.sigen_plant_rated_energy_capacity') }} kWh"
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.sigen_plant_daily_battery_charge_energy
                name: Laddat idag
                icon: mdi:battery-plus-variant
              - entity: sensor.sigen_plant_daily_battery_discharge_energy
                name: Urladdat idag
                icon: mdi:battery-minus-variant
              - entity: sensor.sigen_battery_estimated_energy
                name: Uppskattad energi
                icon: mdi:battery-charging-medium

      # ── PV STRINGS ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Solpaneler
            subtitle: Effekt per sträng
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: true
              colorize_states: true
            graph_span: 24h
            span:
              start: day
            chart_type: line
            apex_config:
              chart:
                height: 240
                stacked: true
                toolbar:
                  show: false
              stroke:
                curve: smooth
                width: 1.5
              fill:
                type: gradient
                gradient:
                  opacityFrom: 0.5
                  opacityTo: 0.05
              dataLabels:
                enabled: false
              grid:
                borderColor: "rgba(255,255,255,0.06)"
                strokeDashArray: 4
              legend:
                show: true
                position: bottom
                labels:
                  colors: "#9aa0a6"
              xaxis:
                labels:
                  style:
                    colors: "#9aa0a6"
              yaxis:
                decimalsInFloat: 1
                labels:
                  style:
                    colors: "#9aa0a6"
            series:
              - entity: sensor.sigen_inverter_pv1_power
                name: Sträng 1
                type: area
                color: "#ffd54f"
              - entity: sensor.sigen_inverter_pv2_power
                name: Sträng 2
                type: area
                color: "#ffb300"
              - entity: sensor.sigen_inverter_pv3_power
                name: Sträng 3
                type: area
                color: "#fb8c00"
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Sträng 1
                secondary: "{{ states('sensor.sigen_inverter_pv1_daily_energy') }} kWh"
                icon: mdi:solar-panel
                icon_color: amber
                entity: sensor.sigen_inverter_pv1_power
                tap_action:
                  action: more-info
              - type: custom:mushroom-template-card
                primary: Sträng 2
                secondary: "{{ states('sensor.sigen_inverter_pv2_daily_energy') }} kWh"
                icon: mdi:solar-panel
                icon_color: amber
                entity: sensor.sigen_inverter_pv2_power
                tap_action:
                  action: more-info
              - type: custom:mushroom-template-card
                primary: Sträng 3
                secondary: "{{ states('sensor.sigen_inverter_pv3_daily_energy') }} kWh"
                icon: mdi:solar-panel
                icon_color: amber
                entity: sensor.sigen_inverter_pv3_power
                tap_action:
                  action: more-info

      # ── TOTALS ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Totalt
            subtitle: Ackumulerat
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.sigen_plant_total_pv_generation
                name: Total solproduktion
                icon: mdi:solar-power
              - entity: sensor.sigen_plant_total_load_consumption
                name: Total förbrukning
                icon: mdi:home-lightning-bolt
              - entity: sensor.sigen_plant_total_imported_energy
                name: Totalt importerat
                icon: mdi:transmission-tower-import
              - entity: sensor.sigen_plant_total_exported_energy
                name: Totalt exporterat
                icon: mdi:transmission-tower-export
              - type: divider
              - entity: sensor.sigen_plant_total_imported_energy_cost
                name: Total importkostnad
                icon: mdi:cash-minus
              - entity: sensor.sigen_plant_ems_work_mode
                name: Driftläge
                icon: mdi:cog
              - entity: sensor.sigen_plant_plant_running_state
                name: Anläggningsstatus
                icon: mdi:factory

  # ═══════════════════════════════════════════════════════════════
  # 3 · ELPRIS
  # ═══════════════════════════════════════════════════════════════
  - title: Elpris
    path: elpris
    icon: mdi:cash-multiple
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Elpris SE3
            subtitle: Nord Pool spotpris
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:cash
                icon_color: orange
                content: "Nu {{ states('sensor.nord_pool_se3_current_price') }}"
              - type: template
                icon: mdi:arrow-down-bold
                icon_color: green
                content: "Lägst {{ states('sensor.nord_pool_se3_lowest_price') }}"
              - type: template
                icon: mdi:arrow-up-bold
                icon_color: red
                content: "Högst {{ states('sensor.nord_pool_se3_highest_price') }}"
              - type: template
                icon: mdi:clock-fast
                icon_color: blue
                content: "Nästa {{ states('sensor.nord_pool_se3_next_price') }}"
          - type: custom:apexcharts-card
            header:
              show: true
              title: Elpris idag
              show_states: true
              colorize_states: true
            graph_span: 24h
            span:
              start: day
            now:
              show: true
              label: Nu
              color: "#ffffff"
            apex_config:
              chart:
                height: 280
                toolbar:
                  show: false
              dataLabels:
                enabled: false
              grid:
                borderColor: "rgba(255,255,255,0.06)"
                strokeDashArray: 4
              plotOptions:
                bar:
                  columnWidth: "75%"
                  borderRadius: 2
              legend:
                show: true
                position: bottom
                labels:
                  colors: "#9aa0a6"
              xaxis:
                labels:
                  style:
                    colors: "#9aa0a6"
              yaxis:
                decimalsInFloat: 2
                labels:
                  style:
                    colors: "#9aa0a6"
            series:
              - entity: sensor.nord_pool_se3_current_price
                name: Spotpris
                type: column
                color_threshold:
                  - value: 0
                    color: "#43a047"
                  - value: 0.5
                    color: "#c0ca33"
                  - value: 0.9
                    color: "#fb8c00"
                  - value: 1.3
                    color: "#e53935"
                data_generator: |
                  let src = null;
                  for (const id in hass.states) {
                    if (id.indexOf('nord_pool') !== -1 || id.indexOf('nordpool') !== -1) {
                      const a = hass.states[id].attributes || {};
                      if (a.raw_today && a.raw_today.length) { src = a; break; }
                    }
                  }
                  if (!src) return [];
                  const arr = [].concat(src.raw_today || [], src.raw_tomorrow || []);
                  return arr
                    .map(p => [new Date(p.start || p.time || p.from).getTime(),
                               (p.value != null ? p.value : p.price)])
                    .filter(x => x[1] != null);
              - entity: sensor.total_electricity_price
                name: Totalt (faktiskt)
                type: line
                color: "#ffffff"
                stroke_width: 2
                opacity: 0.6
          - type: entities
            title: Priskomponenter
            show_header_toggle: false
            entities:
              - entity: sensor.total_electricity_price
                name: Totalt elpris
                icon: mdi:cash-register
              - entity: sensor.nord_pool_se3_current_price
                name: Spotpris (Nord Pool)
                icon: mdi:chart-line
              - entity: sensor.vattenfall_sales
                name: Vattenfall försäljning
                icon: mdi:transmission-tower
              - entity: input_number.electricity_additional_costs
                name: Påslag / avgifter
                icon: mdi:plus-box
              - entity: sensor.sigen_plant_daily_grid_export_energy_compensation
                name: Exportersättning idag
                icon: mdi:cash-plus

  # ═══════════════════════════════════════════════════════════════
  # 4 · FÖRBRUKNING
  # ═══════════════════════════════════════════════════════════════
  - title: Förbrukning
    path: forbrukning
    icon: mdi:flash
    type: sections
    max_columns: 4
    sections:
      # ── KÖK ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Kök
            subtitle: Vitvaror & apparater
          - type: custom:mini-graph-card
            name: Kök
            icon: mdi:stove
            hours_to_show: 12
            points_per_hour: 6
            line_width: 2.5
            smoothing: true
            show:
              fill: fade
              legend: true
            entities:
              - entity: sensor.spis_och_ugn_power
                name: Spis/Ugn
                color: "#e94560"
              - entity: sensor.kylskap_power_2
                name: Kyl
                color: "#1e88e5"
              - entity: sensor.frysskap_power
                name: Frys
                color: "#00bcd4"
              - entity: sensor.diskmaskin_power
                name: Disk
                color: "#43a047"
              - entity: sensor.vinkyl_power
                name: Vinkyl
                color: "#9c27b0"
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Spis & Ugn
                secondary: "{{ states('sensor.spis_och_ugn_power')|float(0)|round(0) }} W"
                icon: mdi:stove
                icon_color: >-
                  {% set p = states('sensor.spis_och_ugn_power')|float(0)|abs %}{% if p > 1000 %}red{% elif p > 100 %}deep-orange{% elif p > 20 %}amber{% elif p > 2 %}green{% else %}grey{% endif %}
                entity: sensor.spis_och_ugn_power
                tap_action:
                  action: more-info
              - type: custom:mushroom-template-card
                primary: Kylskåp
                secondary: "{{ states('sensor.kylskap_power_2')|float(0)|round(0) }} W"
                icon: mdi:fridge
                icon_color: >-
                  {% set p = states('sensor.kylskap_power_2')|float(0) %}{% if p > 100 %}deep-orange{% elif p > 20 %}amber{% elif p > 2 %}green{% else %}grey{% endif %}
                entity: sensor.kylskap_power_2
                tap_action:
                  action: more-info
              - type: custom:mushroom-template-card
                primary: Frysskåp
                secondary: "{{ states('sensor.frysskap_power')|float(0)|round(0) }} W"
                icon: mdi:fridge-outline
                icon_color: >-
                  {% set p = states('sensor.frysskap_power')|float(0) %}{% if p > 100 %}deep-orange{% elif p > 20 %}amber{% elif p > 2 %}green{% else %}grey{% endif %}
                entity: sensor.frysskap_power
                tap_action:
                  action: more-info
              - type: custom:mushroom-template-card
                primary: Diskmaskin
                secondary: "{{ states('sensor.diskmaskin_power')|float(0)|round(0) }} W"
                icon: mdi:dishwasher
                icon_color: >-
                  {% set p = states('sensor.diskmaskin_power')|float(0) %}{% if p > 1000 %}red{% elif p > 100 %}deep-orange{% elif p > 20 %}amber{% elif p > 2 %}green{% else %}grey{% endif %}
                entity: switch.diskmaskin
                tap_action:
                  action: toggle
              - type: custom:mushroom-template-card
                primary: Vinkyl
                secondary: "{{ states('sensor.vinkyl_power')|float(0)|round(0) }} W"
                icon: mdi:glass-wine
                icon_color: >-
                  {% set p = states('sensor.vinkyl_power')|float(0) %}{% if p > 100 %}deep-orange{% elif p > 20 %}amber{% elif p > 2 %}green{% else %}grey{% endif %}
                entity: switch.vinkyl
                tap_action:
                  action: toggle
              - type: custom:mushroom-template-card
                primary: Fläkt / div
                secondary: "{{ states('sensor.flakt_kok_div_power')|float(0)|round(0) }} W"
                icon: mdi:fan
                icon_color: >-
                  {% set p = states('sensor.flakt_kok_div_power')|float(0) %}{% if p > 100 %}deep-orange{% elif p > 20 %}amber{% elif p > 2 %}green{% else %}grey{% endif %}
                entity: switch.flakt_kok_div
                tap_action:
                  action: toggle

      # ── TVÄTT ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Tvätt
            subtitle: Tvättstuga
          - type: custom:mini-graph-card
            name: Tvätt
            icon: mdi:washing-machine
            hours_to_show: 12
            points_per_hour: 6
            line_width: 2.5
            smoothing: true
            show:
              fill: fade
              legend: true
            entities:
              - entity: sensor.tvattmaskin_power_2
                name: Tvättmaskin
                color: "#1e88e5"
              - entity: sensor.torktumlare_power
                name: Torktumlare
                color: "#e94560"
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Tvättmaskin
                secondary: "{{ states('sensor.tvattmaskin_power_2')|float(0)|round(0) }} W"
                icon: mdi:washing-machine
                icon_color: >-
                  {% set p = states('sensor.tvattmaskin_power_2')|float(0) %}{% if p > 1000 %}red{% elif p > 100 %}deep-orange{% elif p > 20 %}amber{% elif p > 2 %}green{% else %}grey{% endif %}
                entity: switch.tvattmaskin_2
                tap_action:
                  action: toggle
              - type: custom:mushroom-template-card
                primary: Torktumlare
                secondary: "{{ states('sensor.torktumlare_power')|float(0)|round(0) }} W"
                icon: mdi:tumble-dryer
                icon_color: >-
                  {% set p = states('sensor.torktumlare_power')|float(0) %}{% if p > 1000 %}red{% elif p > 100 %}deep-orange{% elif p > 20 %}amber{% elif p > 2 %}green{% else %}grey{% endif %}
                entity: switch.torktumlare
                tap_action:
                  action: toggle

      # ── VÄRME & VVB ──
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Värme & VVB
